<h4 class="mat-font-title-lg">
  With <code>.mat-expressive-icon-button</code> class and <code>data-*</code> attributes
</h4>
<section>
  <div class="example-button-row">
    <button
      mat-icon-button
      [attr.data-appearance]="appearance()"
      [attr.data-size]="size()"
      [attr.data-shape]="shape()"
      [attr.data-toggle]="toggle()"
      class="mat-expressive-icon-button"
    >
      <mat-icon>more_vert</mat-icon>
    </button>
    <button
      mat-icon-button
      [attr.data-appearance]="appearance()"
      [attr.data-size]="size()"
      [attr.data-shape]="shape()"
      [attr.data-toggle]="toggle()"
      disabled
      class="mat-expressive-icon-button"
    >
      <mat-icon>settings</mat-icon>
    </button>
    <a
      mat-icon-button
      [attr.data-appearance]="appearance()"
      [attr.data-size]="size()"
      [attr.data-shape]="shape()"
      [attr.data-toggle]="toggle()"
      href="#"
      target="_blank"
      class="mat-expressive-icon-button"
      ><mat-icon>link</mat-icon></a
    >
  </div>
</section>
<mat-divider />
<mat-divider />
